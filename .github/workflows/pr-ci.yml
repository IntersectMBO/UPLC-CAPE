name: PR CI

on:
  pull_request:
  workflow_dispatch:

# Cancel in-progress runs for the same PR
concurrency:
  group: pr-ci-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  format-check:
    name: Check pretty-uplc formatting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true

      - name: Use Cachix (pull/push if token provided)
        uses: cachix/cachix-action@v17
        with:
          name: uplc-cape
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: List .uplc files changed vs main
        id: changed
        run: |
          git fetch origin main --depth=1
          mapfile -t files < <(git diff --name-only --diff-filter=ACMR origin/main...HEAD -- '*.uplc')
          if [ ${#files[@]} -eq 0 ]; then
            echo "No .uplc changes vs origin/main; skipping format check."
            echo "files=" >> "$GITHUB_OUTPUT"
          else
            printf 'Will check %d file(s):\n' "${#files[@]}"
            printf '  - %s\n' "${files[@]}"
            printf 'files=%s\n' "${files[*]}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run treefmt --ci on changed .uplc files
        if: steps.changed.outputs.files != ''
        run: |
          # shellcheck disable=SC2086
          nix develop --accept-flake-config --command treefmt --ci ${{ steps.changed.outputs.files }}

  build-measure:
    name: Build Measure Executable
    runs-on: ubuntu-latest
    steps:
      - name: Nothing but Nix - Optimize disk space
        uses: wimpysworld/nothing-but-nix@687c797a730352432950c707ab493fcc951818d7 # v10

      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true

      - name: Use Cachix (pull/push if token provided)
        uses: cachix/cachix-action@v17
        with:
          name: uplc-cape
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build measure executable
        run: nix build .#measure --accept-flake-config -o result

      - name: Upload measure executable
        uses: actions/upload-artifact@v7
        with:
          name: measure-executable
          path: result/bin/measure
          retention-days: 1

  validate:
    name: Build and Test
    needs: build-measure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true

      - name: Use Cachix (pull/push if token provided)
        uses: cachix/cachix-action@v17
        with:
          name: uplc-cape
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Download measure executable
        uses: actions/download-artifact@v8
        with:
          name: measure-executable
          path: result/bin

      - name: Make measure executable
        run: chmod +x result/bin/measure

      - name: Run Haskell test suite
        run: nix flake check --accept-flake-config

      - name: Verify all submissions
        run: nix develop --accept-flake-config --command bash -c "echo 'Checking result/bin:' && ls -lh result/bin/ && export PATH=\"\$PWD/result/bin:\$PATH\" && cape submission verify --all --verbose"

  preview:
    name: Deploy PR Preview
    needs: [build-measure, validate]
    runs-on: ubuntu-latest
    # Only run on PRs (not workflow_dispatch)
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check if the preview needs rebuilding
        id: check_changes
        run: |
          # Deploy a preview when either the report inputs (submission data) or
          # the report pipeline itself (generator, aggregate, templates) change.
          # A pipeline-only PR produces no submission diff but can still change
          # every rendered page, so it must be previewable too.
          if git diff --name-only origin/main...HEAD | grep -qE \
            'submissions/.*(\.uplc|/metadata\.json)$|scripts/cape-subcommands/submission/(report|aggregate)\.sh$|scripts/cape-subcommands/submission/.*\.html\.tmpl$'; then
            echo "Report inputs or pipeline changed, proceeding with report generation"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "No submission-data or report-pipeline changes detected (only docs/README), skipping deployment"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Install Nix
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true

      - name: Use Cachix (pull/push if token provided)
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: cachix/cachix-action@v17
        with:
          name: uplc-cape
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Download measure executable
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: actions/download-artifact@v8
        with:
          name: measure-executable
          path: result/bin

      - name: Make measure executable
        if: steps.check_changes.outputs.has_changes == 'true'
        run: chmod +x result/bin/measure

      - name: Measure production submissions
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          nix develop --accept-flake-config --command bash -c "export PATH=\"\$PWD/result/bin:\$PATH\" && cape submission measure --all"

      - name: Build measure-preview
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          nix develop --accept-flake-config --command bash -c "cabal --project-file=cabal.project.preview build measure-preview"

      - name: Measure preview submissions
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          nix develop --accept-flake-config --command bash -c "cape submission measure --preview"

      - name: Generate HTML reports
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          nix develop --accept-flake-config --command bash -c "export PATH=\"\$PWD/result/bin:\$PATH\" && cape submission report --all"

      - name: Deploy to GitHub Pages
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./report
          destination_dir: pr-${{ github.event.pull_request.number }}
          keep_files: true

      - name: Post preview link comment
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: pr-preview
          message: |
            ## 🚀 PR Preview Deployed

            Preview URL: https://intersectmbo.github.io/UPLC-CAPE/pr-${{ github.event.pull_request.number }}/

            The preview site is automatically updated on every push to this PR and will be removed when the PR is closed.

      - name: Skip message
        if: steps.check_changes.outputs.has_changes == 'false'
        run: |
          echo "ℹ️  No submission data changes detected. Skipping report generation."
          echo "Only documentation or README files were modified in the submissions/ directory."
